<!DOCTYPE html>
<html lang="en">
<head>
    <title>Update Song Rating</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
</head>
<body>
<div class="container">
    <h2 class="mt-5">Update Song Rating</h2>
    <form method="POST">
        <div class="form-group">
            <label for="song_title">Song Title</label>
            <input type="text" name="song_title" id="song_title" class="form-control" required>
        </div>
        <div class="form-group">
            <label for="rating">Rating (1–10)</label>
            <input type="number" name="rating" id="rating" class="form-control" min="1" max="10" required>
        </div>
        <button type="submit" class="btn btn-primary">Update Rating</button>
        <a href="{{ url_for('display_songs') }}" class="btn btn-secondary">Back</a>
    </form>
</div>
</body>
</html>
