<!DOCTYPE html>
<html lang="en">
<head>
    <title>Songs List</title>
    <!-- Bootstrap CSS for styling the table -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
</head>
<body>
    <div class="container">
        <h2 class="mt-5">Songs Library</h2>
        <table class="table table-bordered table-striped mt-3">
            <thead class="thead-dark">
                <tr>
                    <th>Song Title</th>
                    <th>Album</th>
                    <th>Artist</th>
                    <th>Views</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for song in songs %}
                <tr>
                    <td>{{ song.song }}</td>
                    <td>{{ song.album }}</td>
                    <td>{{ song.artist }}</td>
                    <td>{{ song.views }}</td>
                    <td> <form method="POST" action="{{ url_for('view_song') }}">
                         <input type="hidden" name="song_id" value="{{ song.song_id }}">
                         <button type="submit" class="btn btn-primary">View Song</button>
                        </form>

                </tr>
                {% endfor %}
            </tbody>
        </table>
        <a href="{{ url_for('home') }}" class="btn btn-primary mt-3">Back to Home</a>
    </div>
</body>
</html>
