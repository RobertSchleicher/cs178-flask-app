<!DOCTYPE html>
<html lang="en">
<head>
    <title>Songs List</title>
    <!-- Bootstrap CSS for styling the table -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
</head>
<body>
    <div class="container">
        <h2 class="mt-5">Songs Library</h2>
        <table class="table table-bordered table-striped mt-3">
            <thead class="thead-dark">
                <tr>
                    <th>Song Title</th>
                    <th>Duration</th>
                    <th>Album</th>
                    <th>Artist</th>
                     <th>Rating</th>
                     <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for song in songs %}
                <tr>
                    <td>{{ song.song }}</td>
                    <td>{{ song.duration }}</td>
                    <td>{{ song.album }}</td>
                    <td>{{ song.artist }}</td
                    <td>{{ song.rating }}</td>
                    <td>
                        <a href="{{ url_for('update_song', song_title=song.song) }}" class="btn btn-sm btn-secondary">Update Rating</a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        <a href="{{ url_for('home') }}" class="btn btn-primary mt-3">Back to Home</a>
    </div>
</body>
</html>
