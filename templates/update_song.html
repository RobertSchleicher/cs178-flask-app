<!DOCTYPE html>
<html lang="en">
<head>
    <title>Update Song</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
</head>
<body>
<div class="container">
    <h2 class="mt-5">Update Song Info</h2>
    <form method="POST" class="mt-3">
        <div class="form-group">
            <label for="song_id">Select Song</label>
            <select class="form-control" name="song_id" required>
                {% for song in songs %}
                <option value="{{ song.song_id }}">{{ song.title }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label>New Title</label>
            <input type="text" name="title" class="form-control" placeholder="Leave blank to keep current">
        </div>
        <div class="form-group">
            <label>New Artist</label>
            <input type="text" name="artist" class="form-control" placeholder="Leave blank to keep current">
        </div>
        <div class="form-group">
            <label>New Album</label>
            <input type="text" name="album" class="form-control" placeholder="Leave blank to keep current">
        </div>
        <div class="form-group">
            <label>New Duration (MM:SS)</label>
            <input type="text" name="duration" class="form-control" placeholder="Leave blank to keep current">
        </div>
        <button type="submit" class="btn btn-success">Update Song</button>
    </form>
    <a href="{{ url_for('home') }}" class="btn btn-primary mt-3">Back to Home</a>
</div>
</body>
</html>
