<!DOCTYPE html>
<html lang="en">
<head>
    <title>Home Page</title>
    <!-- Bootstrap CSS -->
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <!-- display a flash message here, if necessary -->
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="alert alert-{{ category }}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}
    <div class="container">
        <h1 class="mt-5">Music Library</h1>
        <div class="mt-3">
            <!-- Add Song Button -->
            <a href="/add-song" class="btn btn-primary">Add Song</a>
            <!-- Delete Song Button -->
            <a href="/delete-song" class="btn btn-danger">Delete Song</a>
            <!-- Update Song Button -->
            <a href="/update-song" class="btn btn-secondary">Update Song</a>
            <!-- Display All Songs Button -->
            <a href="/display-songs" class="btn btn-info">Display All Songs</a>
        </div>
    </div>
</body>
</html>
